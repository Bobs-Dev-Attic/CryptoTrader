# Alembic config for CryptoTrader.
#
# At runtime the app builds the Config programmatically (see
# app/migrations_runtime.py) and migrations self-apply on startup — serverless
# has no separate migration step. This file exists so a developer can also run
# the `alembic` CLI locally, e.g. to autogenerate a new revision:
#
#   cd backend && alembic revision --autogenerate -m "add X"
#   cd backend && alembic history
#
# The database URL is NOT set here; env.py uses the application's own engine
# (app.database.engine), which reads DATABASE_URL via settings.
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
